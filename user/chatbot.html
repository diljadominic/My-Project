{% extends "user/user_base.html" %}
{% block content %}
<div class="container">
    <div class="row mt-4">
      <div class="col-3"></div>
      <div class="col-4">
        <h3>Questions</h3>
        <ul>
          {% if question %}
          <p>{{question}}</p>
          {% endif %}
        </ul>
      </div>
      <div class="col-3">
        <h3>Answers</h3>

        {% if answer %}
        <p>{{answer}}</p>
        {% endif %}

      </div>

    </div>
  </div>


</main>

<!-- Bottom Input Field -->
<div class="bottom-input">
  <div class="container mt-2">
    <div class="row">
      <div class="col-2"></div>
      <div class="col-md-7 mb-2">
        <form method="post">
          {% csrf_token %}
          <!-- Input Field -->
          <input type="text" class="form-control" name="question" placeholder="Ask a question....">
      </div>
      <div class="col-md-2">
        <!-- Button -->
        <button type="submit" class="btn btn-primary btn-block">Send</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock  %}
