{% extends "user/user_base.html" %}
{% block content %}


<div class="site-section bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <section id="contact-form">
                            <h2 class="text-center">Feedback</h2>
                            <form id="contact" method="post" accept-charset="utf-8">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label for="name" class="form-label"><span>Name</span></label>
                                    <input name="feed_name" id="feed_name" type="text" class="form-control" placeholder="Name">
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label"><span>Email</span></label>
                                    <input name="feed_email" id="email" type="email" class="form-control" placeholder="Email">
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label"><span>Message</span></label>
                                    <textarea name="feed_message" id="message" class="form-control" placeholder="Message" rows="4"></textarea>
                                </div> 
                                <div class="text-center">
                                <button type="submit" class="btn btn-primary">Send</button>
                            </div>
                            </form>
                            <aside>
                                <!-- <p>Just hit Send on an empty form to see the invalid input animation</p>
                                <p>Fill in the form fields to see the success animation (no real validation, any random input will do)</p> -->
                            </aside>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock  %}
