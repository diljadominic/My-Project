{% extends "user/user_base.html" %}
{% block content %}
<link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
<div class="container">
    <div class="mt-5">
        <h4 class="text-center">Make Payment to Chat With CareTakers</h4>
        {% for i in care %}
        <div class="d-style btn btn-brc-tp border-2 bgc-white btn-outline-purple btn-h-outline-purple btn-a-outline-purple w-100 my-2 py-3 shadow-sm">
            <div class="row align-items-center">
                <div class="col-12 col-md-4">
                    <h4 class="pt-3 text-170 text-600 text-purple-d1 letter-spacing">
                        {{ i.care_fullname }}
                    </h4>
                    <div class="text-secondary-d1 text-120">
                        <span class="ml-n15 align-text-bottom">₹499</span>
                    </div>
                </div>
                <ul class="list-unstyled mb-0 col-12 col-md-4 text-dark-l1 text-90 text-left my-4 my-md-0">
                    <li>
                        <i class="fa fa-check text-success-m2 text-110 mr-2 mt-1"></i>
                        <span class="text-110">Everything in Pro...</span>
                    </li>
                    <li class="mt-25">
                        <i class="fa fa-check text-success-m2 text-110 mr-2 mt-1"></i>
                        <span class="text-110">Solve Everything</span>
                    </li>
                </ul>
                <div class="col-12 col-md-4 text-center">
                    <div class="d-flex justify-content-center">
                        {% if i.care_id in paid_caretakers %}
                            <a href="/chat?id={{ i.care_id }}" class="f-n-hover btn btn-warning btn-raised px-4 py-25 w-50 text-600 mr-1">Chat</a>
                        {% else %}
                            <a href="/pay?id={{ i.care_id }}" class="f-n-hover btn btn-primary btn-raised px-4 py-25 w-50 text-600 ml-1">Pay</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
