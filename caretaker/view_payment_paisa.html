{% extends "caretaker/caretaker_base.html" %}
{% block content %}

<table class="table align-middle mb-0 bg-white">
    <h3 class="text-center mt-3">PAYMENT DETAILS</h3>
    <thead class="bg-light">
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Phone</th>
        
        <!-- <th>Status</th> -->
      
      </tr>
    </thead>
    <tbody>
        {% for i in care %}
      <tr>
        <td>
            {{i.uid.u_fullname}}
        </td>
        <td>
            {{i.uid.u_email}}
        
        </td>
       
        <td>{{i.uid.u_phone}}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>


{% endblock  %}
