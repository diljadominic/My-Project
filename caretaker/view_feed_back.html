{% extends "caretaker/caretaker_base.html" %}
{% block content %}

<table class="table align-middle mb-0 bg-white">
    <h3 class="text-center mt-3">FeedBack </h3>
    <thead class="bg-light">
      <tr>
        <th>Username</th>
        <th>Email</th>
        
        <th>Review</th>
      
      </tr>
    </thead>
    <tbody>
        {% for i in care %}
      <tr>
        <td>
            {{i.feed_name}}
        </td>
        <td>
            {{i.feed_email}}
        
        </td>
       
        <td>{{i.saysomething}}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>


{% endblock  %}
